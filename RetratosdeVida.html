<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Retratos de Vida - MelVisions Fotografía Comercial"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v6.0.0/css/all.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" href="icons/retrato.png" />
    <title>Retratos de Vida - MelVisions</title>
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <nav class="header__navbar">
        <div class="container header__container">
          <div class="header__logo-wrapper">
            <h1 class="header__logo">
              <a href="index.html" class="header__logo-link">MelVisions</a>
            </h1>
          </div>

          <input
            type="checkbox"
            class="header__menu-checkbox"
            id="menu-toggle"
          />
          <label for="menu-toggle" class="header__menu-toggle">
            <span></span>
            <span></span>
            <span></span>
          </label>

          <ul class="header__menu">
            <li class="header__menu-item">
              <a href="index.html" class="header__menu-link">Inicio</a>
            </li>
            <li class="header__menu-item">
              <a href="contactanos.html" class="header__menu-link">Contacto</a>
            </li>
          </ul>
        </div>
      </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
      <div class="hero__content">
        <h2 class="hero__title">Retratos de Vida</h2>
        <p class="hero__description">
          Mis retratos capturan la esencia misma de quienes eres y a quienes
          amas, revelando la belleza auténtica en cada expresión y conexión
          humana.
        </p>
      </div>
    </section>

    <!-- Gallery Section -->
    <main class="portfolio">
      <div class="container">
        <section class="gallery">
          <img
            src="Img/5cate1.jpg"
            alt="Retratos de Vida 1"
            class="gallery__image"
          />
          <img
            src="Img/5cate2.jpg"
            alt="Retratos de Vida 2"
            class="gallery__image"
          />
          <img
            src="Img/5cate8.jpg"
            alt="Retratos de Vida 3"
            class="gallery__image"
          />
          <img
            src="Img/5cate4.jpg"
            alt="Retratos de Vida 4"
            class="gallery__image"
          />
          <img
            src="Img/5cate5.jpg"
            alt="Retratos de Vida 5"
            class="gallery__image"
          />
          <img
            src="Img/5cate6.jpg"
            alt="Retratos de Vida 6"
            class="gallery__image"
          />
        </section>

        <!-- Navigation Buttons -->
        <div class="nav-buttons">
          <div class="nav-buttons__divider"></div>
          <a href="JuguetesEncantados.html" class="nav-buttons__button"
            >Anterior</a
          >
          <a href="contactanos.html" class="nav-buttons__button">Siguiente</a>
          <div class="nav-buttons__divider"></div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <div class="footer__content">
          <p class="footer__copyright">
            &copy; 2024 MelVisions - Fotografía Comercial. Todos los derechos
            reservados.
          </p>
          <ul class="footer__socials">
            <li class="footer__social-item">
              <a
                href="https://www.facebook.com/profile.php?id=100087366038981&mibextid=ZbWKwL"
                target="_blank"
                rel="noopener noreferrer"
                class="footer__social-link"
                aria-label="Facebook"
              >
                <i class="fab fa-facebook-f"></i>
              </a>
            </li>
            <li class="footer__social-item">
              <a
                href="https://x.com/Melkook03?t=htmIv036nsxcJDWpl2yvNg&s=09"
                target="_blank"
                rel="noopener noreferrer"
                class="footer__social-link"
                aria-label="Twitter"
              >
                <i class="fab fa-twitter"></i>
              </a>
            </li>
            <li class="footer__social-item">
              <a
                href="https://www.instagram.com/mel_art_jk?igsh=MW1rY2E2NzQxZmFneQ=="
                target="_blank"
                rel="noopener noreferrer"
                class="footer__social-link"
                aria-label="Instagram"
              >
                <i class="fab fa-instagram"></i>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </footer>

    <script src="js/main.js"></script>
  </body>
</html>
